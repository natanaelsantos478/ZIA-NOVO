<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ZITA — Sua empresa trabalha enquanto você dorme.</title>
<meta name="description" content="ZITA é um escritório virtual de agentes de IA que prospecta, qualifica, vende e opera 24/7. ERP nativo com 58 submódulos. Para PMEs brasileiras de 10 a 500 funcionários." />
<meta property="og:title" content="ZITA — Sua empresa trabalha enquanto você dorme." />
<meta property="og:description" content="Um time de robôs que busca clientes, conversa, vende e organiza sua empresa. 24h por dia, sem contratar mais gente." />
<meta property="og:type" content="website" />
<meta property="og:locale" content="pt_BR" />
<meta name="robots" content="index, follow" />

<link rel="icon" href="assets/zita-logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
:root {
  --bg: #ffffff; --bg-soft: #fafafa; --ink: #0a0a0b; --ink-2: #1a1a1e;
  --muted: #6b6b75; --muted-2: #9a9aa3; --line: #e8e8ec;
  --cyan: #5dd6ee; --magenta: #c77cf0;
  --grad: linear-gradient(135deg, #5dd6ee 0%, #8aa6f0 45%, #c77cf0 100%);
  --grad-2: linear-gradient(120deg, #7de3f4, #c77cf0);
  --grad-soft: linear-gradient(135deg, rgba(93,214,238,0.18), rgba(199,124,240,0.18));
  --shadow-1: 0 1px 2px rgba(10,10,11,.04), 0 4px 12px rgba(10,10,11,.04);
  --shadow-2: 0 2px 6px rgba(10,10,11,.06), 0 24px 48px -12px rgba(10,10,11,.10);
  --shadow-3: 0 30px 80px -20px rgba(93,214,238,.25), 0 30px 80px -20px rgba(199,124,240,.25);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg); color: var(--ink);
  font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  font-feature-settings: 'ss01','cv11'; -webkit-font-smoothing: antialiased;
  line-height: 1.5; letter-spacing: -0.01em; overflow-x: hidden;
}
img { display: block; max-width: 100%; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }

.container { max-width: 1280px; margin: 0 auto; padding: 0 32px; }
.eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: 'Geist Mono', monospace; font-size: 11px; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--muted);
  padding: 6px 10px; border: 1px solid var(--line);
  border-radius: 999px; background: rgba(255,255,255,0.6); backdrop-filter: blur(8px);
}
.eyebrow .dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--grad);
  box-shadow: 0 0 0 3px rgba(199,124,240,0.18);
}
.section-title {
  font-size: clamp(40px, 5.5vw, 76px); font-weight: 600;
  letter-spacing: -0.035em; line-height: 1.02; text-wrap: balance;
}
.section-sub { font-size: 18px; color: var(--muted); max-width: 640px; text-wrap: pretty; }
.gradient-text {
  background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent;
}

.btn {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 14px 22px; border-radius: 12px; font-size: 15px; font-weight: 500;
  letter-spacing: -0.01em;
  transition: transform .2s ease, box-shadow .2s ease, background .2s ease;
}
.btn-primary { background: var(--ink); color: #fff; position: relative; overflow: hidden; }
.btn-primary::before {
  content: ''; position: absolute; inset: -2px; background: var(--grad);
  opacity: 0; transition: opacity .25s ease; z-index: -1; border-radius: 14px; filter: blur(10px);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: var(--shadow-3); }
.btn-primary:hover::before { opacity: .8; }
.btn-ghost { background: rgba(0,0,0,0.04); color: var(--ink); }
.btn-ghost:hover { background: rgba(0,0,0,0.08); }
.btn-xl { padding: 22px 36px; font-size: 18px; border-radius: 16px; }
.btn .arrow { transition: transform .2s ease; }
.btn:hover .arrow { transform: translateX(3px); }

.nav {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 100;
  display: flex; align-items: center; gap: 24px; padding: 10px 12px 10px 18px;
  border-radius: 999px; background: rgba(255,255,255,0.78);
  backdrop-filter: blur(20px) saturate(1.4); border: 1px solid var(--line);
  box-shadow: var(--shadow-1);
}
.nav-logo { display: flex; align-items: center; gap: 8px; font-weight: 600; letter-spacing: -0.01em; }
.nav-logo img { width: 22px; height: 22px; }
.nav-links { display: flex; gap: 4px; }
.nav-links a {
  padding: 6px 12px; border-radius: 999px; font-size: 14px; color: var(--muted);
  transition: color .15s, background .15s;
}
.nav-links a:hover { color: var(--ink); background: rgba(0,0,0,0.04); }
.nav .btn { padding: 8px 16px; font-size: 13px; border-radius: 999px; }
@media (max-width: 760px) { .nav-links { display: none; } }

.bg-grid {
  position: absolute; inset: 0; pointer-events: none;
  background-image: linear-gradient(to right, rgba(10,10,11,0.04) 1px, transparent 1px),
                    linear-gradient(to bottom, rgba(10,10,11,0.04) 1px, transparent 1px);
  background-size: 64px 64px;
  mask-image: radial-gradient(ellipse 80% 60% at 50% 40%, #000 30%, transparent 80%);
}
.bg-mesh { position: absolute; inset: -10%; pointer-events: none; z-index: 0; filter: blur(60px); opacity: 0.55; }
.bg-mesh::before, .bg-mesh::after { content: ''; position: absolute; width: 50%; height: 50%; border-radius: 50%; }
.bg-mesh::before { top: 10%; left: 10%; background: radial-gradient(circle, #7de3f4, transparent 70%); }
.bg-mesh::after { bottom: 10%; right: 10%; background: radial-gradient(circle, #c77cf0, transparent 70%); }

section { position: relative; padding: 140px 0; }

.reveal { opacity: 0; transform: translateY(24px); transition: opacity .9s cubic-bezier(.2,.7,.2,1), transform .9s cubic-bezier(.2,.7,.2,1); }
.reveal.in { opacity: 1; transform: none; }
.reveal-stagger > * { opacity: 0; transform: translateY(16px); transition: opacity .7s cubic-bezier(.2,.7,.2,1), transform .7s cubic-bezier(.2,.7,.2,1); }
.reveal-stagger.in > * { opacity: 1; transform: none; }
.reveal-stagger.in > *:nth-child(1) { transition-delay: .05s; }
.reveal-stagger.in > *:nth-child(2) { transition-delay: .12s; }
.reveal-stagger.in > *:nth-child(3) { transition-delay: .19s; }
.reveal-stagger.in > *:nth-child(4) { transition-delay: .26s; }
.reveal-stagger.in > *:nth-child(5) { transition-delay: .33s; }
.reveal-stagger.in > *:nth-child(6) { transition-delay: .40s; }

.hero {
  min-height: 100vh; padding-top: 120px; padding-bottom: 80px;
  display: flex; flex-direction: column; justify-content: center;
  position: relative; overflow: hidden;
}
.hero-inner {
  position: relative; z-index: 2;
  display: grid; grid-template-columns: 1.1fr 1fr; gap: 60px; align-items: center;
}
@media (max-width: 980px) { .hero-inner { grid-template-columns: 1fr; } }
.hero-headline { font-size: clamp(48px, 7vw, 96px); font-weight: 600; letter-spacing: -0.04em; line-height: 0.98; text-wrap: balance; }
.hero-headline em { font-style: normal; background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent; }
.hero-sub { margin-top: 24px; font-size: 19px; color: var(--muted); max-width: 520px; }
.hero-cta { margin-top: 40px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.hero-meta { margin-top: 28px; display: flex; gap: 24px; font-family: 'Geist Mono', monospace; font-size: 12px; color: var(--muted-2); letter-spacing: 0.04em; }
.hero-meta span { display: inline-flex; align-items: center; gap: 8px; }
.hero-meta .pulse { width: 7px; height: 7px; border-radius: 50%; background: #2bd47c; box-shadow: 0 0 0 4px rgba(43,212,124,0.2); animation: livePulse 2s ease-in-out infinite; }
@keyframes livePulse { 0%,100% { box-shadow: 0 0 0 4px rgba(43,212,124,0.2); } 50% { box-shadow: 0 0 0 8px rgba(43,212,124,0); } }

.hero-visual { position: relative; aspect-ratio: 1; perspective: 1400px; }
.constellation { position: absolute; inset: 0; transform-style: preserve-3d; animation: floatScene 16s ease-in-out infinite; }
@keyframes floatScene { 0%,100% { transform: rotateX(8deg) rotateY(-8deg); } 50% { transform: rotateX(-6deg) rotateY(10deg) rotateZ(2deg); } }
.constellation-glow { position: absolute; inset: 8%; background: radial-gradient(circle at 50% 50%, rgba(125,227,244,0.35), transparent 55%), radial-gradient(circle at 60% 60%, rgba(199,124,240,0.30), transparent 55%); filter: blur(40px); border-radius: 50%; animation: glowPulse 6s ease-in-out infinite; }
@keyframes glowPulse { 0%,100% { transform: scale(1); opacity: .9; } 50% { transform: scale(1.1); opacity: 1; } }
.constellation .ring { position: absolute; left: 50%; top: 50%; border: 1px dashed rgba(10,10,11,0.14); border-radius: 50%; transform: translate(-50%,-50%); }
.constellation .ring.r1 { width: 88%; height: 88%; }
.constellation .ring.r2 { width: 62%; height: 62%; border-style: solid; border-color: rgba(10,10,11,0.07); }
.constellation .ring.r3 { width: 36%; height: 36%; }
.agent-node { position: absolute; transform: translate(-50%,-50%); display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; transition: transform .25s ease; }
.agent-node:hover { transform: translate(-50%,-50%) scale(1.08); z-index: 5; }
.agent-bubble { width: 56px; height: 56px; border-radius: 16px; background: #fff; border: 1px solid var(--line); box-shadow: var(--shadow-2); display: grid; place-items: center; font-family: 'Geist Mono', monospace; font-size: 11px; letter-spacing: 0.06em; color: var(--ink-2); position: relative; transition: all .3s ease; }
.agent-bubble::after { content: ''; position: absolute; inset: -2px; border-radius: 18px; background: var(--grad); z-index: -1; opacity: 0; filter: blur(10px); transition: opacity .3s; }
.agent-node:hover .agent-bubble { border-color: transparent; }
.agent-node:hover .agent-bubble::after { opacity: 1; }
.agent-bubble.core { width: 88px; height: 88px; border-radius: 22px; background: var(--ink); color: #fff; font-weight: 600; border: none; }
.agent-bubble.core::before { content: ''; position: absolute; inset: 6px; border-radius: 16px; background: var(--grad); opacity: .15; }
.agent-bubble.core img { width: 56px; height: 56px; position: relative; z-index: 1; }
.agent-label { font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.08em; color: var(--muted); text-transform: uppercase; white-space: nowrap; }
.agent-node .ping { position: absolute; inset: -8px; border-radius: 22px; border: 1.5px solid #5dd6ee; opacity: 0; animation: ping 3s ease-out infinite; }
.agent-node:nth-child(odd) .ping { border-color: #c77cf0; animation-delay: 1.2s; }
@keyframes ping { 0% { transform: scale(.7); opacity: .7; } 100% { transform: scale(1.6); opacity: 0; } }
.connector-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; overflow: visible; }
.connector-svg path { fill: none; stroke: url(#cgrad); stroke-width: 1.2; opacity: .55; stroke-dasharray: 4 4; animation: dash 4s linear infinite; }
@keyframes dash { to { stroke-dashoffset: -32; } }
.particles { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
.particle { position: absolute; width: 4px; height: 4px; border-radius: 50%; background: var(--grad); filter: blur(0.5px); opacity: 0; animation: floatP 14s linear infinite; }
@keyframes floatP { 0% { transform: translate(0,0); opacity: 0; } 10% { opacity: .7; } 90% { opacity: .5; } 100% { transform: translate(var(--dx), var(--dy)); opacity: 0; } }

.brand-strip { padding: 56px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); background: var(--bg-soft); position: relative; overflow: hidden; }
.brand-strip::before, .brand-strip::after { content: ''; position: absolute; top: 0; bottom: 0; width: 120px; z-index: 2; pointer-events: none; }
.brand-strip::before { left: 0; background: linear-gradient(to right, var(--bg-soft), transparent); }
.brand-strip::after { right: 0; background: linear-gradient(to left, var(--bg-soft), transparent); }
.brand-strip-inner { display: flex; gap: 80px; align-items: center; font-family: 'Geist Mono', monospace; font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted-2); white-space: nowrap; animation: marquee 40s linear infinite; }
@keyframes marquee { to { transform: translateX(-50%); } }
.brand-strip-inner span { display: inline-flex; align-items: center; gap: 12px; }

.problem { padding: 160px 0; }
.problem-grid { display: grid; grid-template-columns: 1fr 1.05fr; gap: 80px; align-items: start; }
@media (max-width: 920px) { .problem-grid { grid-template-columns: 1fr; gap: 40px; } }
.problem-headline { font-size: clamp(36px, 4.5vw, 64px); font-weight: 600; letter-spacing: -0.035em; line-height: 1.02; }
.problem-headline .strike { text-decoration: line-through; text-decoration-color: rgba(199,124,240,0.5); text-decoration-thickness: 4px; color: var(--muted); }
.problem-stack { display: flex; flex-direction: column; gap: 14px; }
.problem-card { background: #fff; border: 1px solid var(--line); border-radius: 18px; padding: 22px 24px; display: grid; grid-template-columns: 56px 1fr auto; gap: 18px; align-items: center; transition: transform .25s ease, border-color .25s ease, box-shadow .25s ease; }
.problem-card:hover { transform: translateX(8px); border-color: transparent; box-shadow: var(--shadow-3); }
.problem-card .num { width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(135deg, #f8f8fa, #fff); border: 1px solid var(--line); display: grid; place-items: center; font-family: 'Geist Mono', monospace; font-size: 12px; font-weight: 500; color: var(--muted); }
.problem-card .body { display: flex; flex-direction: column; gap: 4px; }
.problem-card .body strong { font-size: 17px; font-weight: 500; letter-spacing: -0.01em; }
.problem-card .body span { font-size: 14px; color: var(--muted); }
.problem-card .cost { font-family: 'Geist Mono', monospace; font-size: 12px; color: #c77cf0; letter-spacing: 0.04em; white-space: nowrap; }

.office { padding: 160px 0; background: linear-gradient(to bottom, transparent, var(--bg-soft) 30%, var(--bg-soft) 70%, transparent); position: relative; }
.office-head { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: end; margin-bottom: 80px; }
@media (max-width: 920px) { .office-head { grid-template-columns: 1fr; } }
.office-stage { position: relative; aspect-ratio: 16/10; perspective: 1600px; border-radius: 32px; background: linear-gradient(180deg, rgba(255,255,255,0.6), rgba(255,255,255,0)), radial-gradient(ellipse at center bottom, rgba(125,227,244,0.12), transparent 60%), #fff; border: 1px solid var(--line); overflow: hidden; box-shadow: 0 30px 80px -30px rgba(10,10,11,0.18); }
.office-stage::before { content: ''; position: absolute; inset: 0; background-image: linear-gradient(to right, rgba(10,10,11,0.04) 1px, transparent 1px), linear-gradient(to bottom, rgba(10,10,11,0.04) 1px, transparent 1px); background-size: 48px 48px; mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, #000, transparent 80%); }
.iso-floor { position: absolute; left: 50%; top: 55%; width: 70%; aspect-ratio: 1.6; transform: translate(-50%,-50%) rotateX(60deg) rotateZ(-45deg); transform-style: preserve-3d; }
.iso-floor::before { content: ''; position: absolute; inset: 0; background: linear-gradient(rgba(10,10,11,0.06) 1px, transparent 1px) 0 0 / 12.5% 12.5%, linear-gradient(to right, rgba(10,10,11,0.06) 1px, transparent 1px) 0 0 / 12.5% 12.5%, linear-gradient(135deg, rgba(125,227,244,0.10), rgba(199,124,240,0.10)); border-radius: 8px; border: 1px solid rgba(10,10,11,0.06); }
.iso-desk { position: absolute; width: 22%; height: 18%; }
.iso-desk-top { position: absolute; inset: 0; background: linear-gradient(135deg, #fff, #f4f4f7); border: 1px solid var(--line); border-radius: 8px; box-shadow: 0 8px 16px -8px rgba(10,10,11,0.2); display: grid; place-items: center; font-family: 'Geist Mono', monospace; font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; padding: 6px; text-align: center; }
.iso-avatar { position: absolute; left: 50%; top: -22px; transform: translateX(-50%); width: 28px; height: 28px; border-radius: 50%; background: var(--grad); border: 2px solid #fff; box-shadow: 0 4px 8px rgba(10,10,11,0.15); }
.iso-avatar::after { content: ''; position: absolute; right: -2px; bottom: -2px; width: 8px; height: 8px; border-radius: 50%; background: #2bd47c; border: 2px solid #fff; animation: livePulse 2s ease-in-out infinite; }

.flow { padding: 180px 0; position: relative; }
.flow-stage { position: relative; aspect-ratio: 1; max-width: 720px; margin: 80px auto 0; }
.flow-center { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); width: 220px; height: 220px; border-radius: 50%; background: #fff; border: 1px solid var(--line); box-shadow: var(--shadow-2); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 3; text-align: center; padding: 24px; }
.flow-center::before { content: ''; position: absolute; inset: -6px; border-radius: 50%; background: var(--grad); z-index: -1; opacity: .25; filter: blur(20px); animation: glowPulse 4s ease-in-out infinite; }
.flow-center .num { font-family: 'Geist Mono', monospace; font-size: 11px; letter-spacing: 0.14em; color: var(--muted); text-transform: uppercase; }
.flow-center .label { margin-top: 8px; font-size: 16px; font-weight: 500; }
.flow-center .copy { margin-top: 8px; font-size: 13px; color: var(--muted); text-wrap: pretty; }
.flow-step { position: absolute; transform: translate(-50%,-50%); width: 180px; cursor: pointer; }
.flow-step-card { background: #fff; border: 1px solid var(--line); border-radius: 16px; padding: 14px 16px; display: flex; flex-direction: column; gap: 4px; box-shadow: var(--shadow-1); transition: all .25s ease; }
.flow-step-card .step-n { font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--muted); }
.flow-step-card .step-t { font-size: 14px; font-weight: 500; letter-spacing: -0.01em; }
.flow-step.active .flow-step-card, .flow-step:hover .flow-step-card { border-color: transparent; box-shadow: var(--shadow-3); transform: translateY(-2px); }
.flow-step.active .flow-step-card .step-n { color: #c77cf0; }
.flow-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
.flow-svg .orbit { fill: none; stroke: var(--line); stroke-width: 1; stroke-dasharray: 3 6; }
.flow-svg .orbit-active { fill: none; stroke: url(#flowgrad); stroke-width: 2; stroke-linecap: round; filter: drop-shadow(0 0 8px rgba(199,124,240,0.5)); }
.flow-particle { fill: url(#flowgrad); filter: drop-shadow(0 0 6px #c77cf0); }

.modules { padding: 160px 0; }
.modules-head { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: end; margin-bottom: 64px; }
@media (max-width: 920px) { .modules-head { grid-template-columns: 1fr; } }
.modules-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
@media (max-width: 1080px) { .modules-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 680px) { .modules-grid { grid-template-columns: 1fr; } }
.mod-card { position: relative; background: #fff; border: 1px solid var(--line); border-radius: 22px; padding: 24px; display: flex; flex-direction: column; gap: 18px; overflow: hidden; transition: transform .3s cubic-bezier(.2,.7,.2,1), border-color .3s, box-shadow .3s; }
.mod-card:hover { transform: translateY(-6px); border-color: transparent; box-shadow: var(--shadow-3); }
.mod-card::before { content: ''; position: absolute; inset: 0; background: var(--grad-soft); opacity: 0; transition: opacity .4s; z-index: 0; pointer-events: none; }
.mod-card:hover::before { opacity: 1; }
.mod-card > * { position: relative; z-index: 1; }
.mod-head { display: flex; justify-content: space-between; align-items: flex-start; }
.mod-tag { font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
.mod-icon { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, rgba(125,227,244,0.18), rgba(199,124,240,0.18)); display: grid; place-items: center; color: var(--ink-2); }
.mod-title { font-size: 22px; font-weight: 500; letter-spacing: -0.02em; line-height: 1.15; }
.mod-copy { font-size: 14px; color: var(--muted); line-height: 1.5; }
.mini-ui { margin-top: auto; background: var(--bg-soft); border: 1px solid var(--line); border-radius: 14px; padding: 14px; height: 180px; position: relative; overflow: hidden; }

.forwhom { padding: 140px 0; background: var(--bg-soft); }
.forwhom-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-top: 60px; }
@media (max-width: 920px) { .forwhom-grid { grid-template-columns: repeat(2, 1fr); } }
.who-card { background: #fff; border: 1px solid var(--line); border-radius: 18px; padding: 22px; display: flex; flex-direction: column; gap: 12px; min-height: 200px; transition: all .25s ease; }
.who-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-2); }
.who-card .icon-block { width: 40px; height: 40px; border-radius: 10px; border: 1px solid var(--line); display: grid; place-items: center; background: var(--bg-soft); }
.who-card .name { font-size: 16px; font-weight: 500; letter-spacing: -0.01em; }
.who-card .meta { margin-top: auto; font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.06em; }

.numbers { padding: 200px 0; position: relative; overflow: hidden; }
.numbers-stack { display: flex; flex-direction: column; }
.number-row { display: grid; grid-template-columns: auto 1fr auto; gap: 32px; align-items: end; padding: 48px 0; border-top: 1px solid var(--line); }
.number-row:last-child { border-bottom: 1px solid var(--line); }
.number-row .big { font-size: clamp(120px, 22vw, 320px); font-weight: 600; letter-spacing: -0.06em; line-height: 0.85; background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent; font-feature-settings: 'tnum'; }

.tl-day strong { color: var(--ink); font-weight: 500; }
.tl-event { display: flex; flex-direction: column; gap: 8px; }

.cta-card::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 20% 30%, rgba(125,227,244,0.4), transparent 60%), radial-gradient(ellipse at 80% 70%, rgba(199,124,240,0.4), transparent 60%); opacity: .8; }
.cta-card::after { content: ''; position: absolute; inset: 0; background-image: linear-gradient(to right, rgba(255,255,255,0.06) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.06) 1px, transparent 1px); background-size: 48px 48px; mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, #000, transparent 90%); }
.cta-card > * { position: relative; z-index: 2; }
.cta-card h2 { font-size: clamp(44px, 6vw, 88px); font-weight: 600; letter-spacing: -0.04em; line-height: 0.98; text-wrap: balance; }

</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useMemo } = React;

function polar(cx, cy, r, deg) {
  const rad = (deg - 90) * Math.PI / 180;
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
}

const I = ({ d }) => (
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
       strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d={d} /></svg>
);

// ── Hero ──────────────────────────────────────────────────────────────────────
function AgentGlyph({ id }) {
  const map = {
    prosp:  'M3 12h6 M9 12l-3-3 M9 12l-3 3 M15 12h6 M15 12l3 3 M15 12l3-3',
    qual:   'M5 5l14 14 M5 19l14-14',
    res:    'M11 4a7 7 0 1 0 4.95 11.95L20 20',
    ops:    'M12 3v18 M3 12h18',
    nurt:   'M12 21s-7-4.35-7-10a4.5 4.5 0 0 1 8-2.83A4.5 4.5 0 0 1 19 11c0 5.65-7 10-7 10z',
    closer: 'M5 13l4 4L19 7',
  };
  return (
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
         stroke="url(#cgrad2)" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
      <defs>
        <linearGradient id="cgrad2" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stopColor="#5dd6ee" /><stop offset="100%" stopColor="#c77cf0" />
        </linearGradient>
      </defs>
      <path d={map[id] || map.prosp} />
    </svg>
  );
}

function Particles({ n = 24 }) {
  const items = useMemo(() => Array.from({ length: n }, () => ({
    x: Math.random() * 100, y: Math.random() * 100,
    dx: (Math.random() - 0.5) * 200, dy: -100 - Math.random() * 200,
    delay: Math.random() * 14, dur: 10 + Math.random() * 8, size: 2 + Math.random() * 4,
  })), [n]);
  return (
    <div className="particles">
      {items.map((p, i) => (
        <span key={i} className="particle" style={{
          left: `${p.x}%`, top: `${p.y}%`, width: p.size, height: p.size,
          '--dx': `${p.dx}px`, '--dy': `${p.dy}px`,
          animationDelay: `${p.delay}s`, animationDuration: `${p.dur}s`,
        }} />
      ))}
    </div>
  );
}

function HeroConstellation() {
  const stageRef = useRef(null);
  const [tilt, setTilt] = useState({ x: 0, y: 0 });
  useEffect(() => {
    const el = stageRef.current;
    if (!el) return;
    const onMove = (e) => {
      const r = el.getBoundingClientRect();
      setTilt({ x: -(e.clientY - r.top) / r.height * 14 + 7, y: (e.clientX - r.left) / r.width * 14 - 7 });
    };
    const onLeave = () => setTilt({ x: 0, y: 0 });
    el.addEventListener('mousemove', onMove);
    el.addEventListener('mouseleave', onLeave);
    return () => { el.removeEventListener('mousemove', onMove); el.removeEventListener('mouseleave', onLeave); };
  }, []);

  const outer = [
    { id: 'prosp', label: 'BUSCA',    deg: 0,   r: 44 },
    { id: 'qual',  label: 'TRIAGEM',  deg: 60,  r: 44 },
    { id: 'res',   label: 'PESQUISA', deg: 120, r: 44 },
    { id: 'ops',   label: 'OPERAÇÃO', deg: 180, r: 44 },
    { id: 'nurt',  label: 'CONTATO',  deg: 240, r: 44 },
    { id: 'closer',label: 'VENDAS',   deg: 300, r: 44 },
  ];
  const inner = [
    { id: 'i1', label: 'CLIENTE', deg: 30,  r: 24 },
    { id: 'i2', label: 'DADOS',   deg: 150, r: 24 },
    { id: 'i3', label: 'CAIXA',   deg: 270, r: 24 },
  ];
  const allNodes = [...outer, ...inner];

  return (
    <div className="hero-visual" ref={stageRef}>
      <div className="constellation" style={{
        transform: `rotateX(${8 + tilt.x}deg) rotateY(${-8 + tilt.y}deg)`,
        transition: 'transform .25s cubic-bezier(.2,.7,.2,1)',
      }}>
        <div className="constellation-glow"></div>
        <div className="ring r1"></div><div className="ring r2"></div><div className="ring r3"></div>
        <svg className="connector-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
          <defs>
            <linearGradient id="cgrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stopColor="#7de3f4" /><stop offset="100%" stopColor="#c77cf0" />
            </linearGradient>
          </defs>
          {allNodes.map((a, i) => {
            const p = polar(50, 50, a.r, a.deg);
            return <path key={i} d={`M 50 50 L ${p.x} ${p.y}`} />;
          })}
          {outer.map((o, i) => {
            const a = polar(50, 50, o.r, o.deg);
            const b = polar(50, 50, o.r, outer[(i+1)%outer.length].deg);
            return <path key={`c${i}`} d={`M ${a.x} ${a.y} Q 50 50 ${b.x} ${b.y}`} style={{opacity:.25}}/>;
          })}
        </svg>
        <div className="agent-node" style={{ left: '50%', top: '50%' }}>
          <div className="agent-bubble core"><img src="assets/zita-logo.png" alt="ZITA" /></div>
        </div>
        {inner.map((a) => {
          const p = polar(50, 50, a.r, a.deg);
          return (
            <div key={a.id} className="agent-node" style={{ left: `${p.x}%`, top: `${p.y}%` }}>
              <div className="agent-bubble" style={{ width: 36, height: 36, borderRadius: 12 }}>
                <span style={{ fontSize: 9 }}>{a.label}</span>
              </div>
            </div>
          );
        })}
        {outer.map((a, i) => {
          const p = polar(50, 50, a.r, a.deg);
          return (
            <div key={a.id} className="agent-node" style={{ left: `${p.x}%`, top: `${p.y}%` }}>
              <div className="ping" style={{ animationDelay: `${i * 0.4}s` }}></div>
              <div className="agent-bubble"><AgentGlyph id={a.id} /></div>
              <div className="agent-label">{a.label}</div>
            </div>
          );
        })}
      </div>
      <Particles n={28} />
    </div>
  );
}

function Hero() {
  return (
    <section className="hero">
      <div className="bg-mesh"></div>
      <div className="bg-grid"></div>
      <div className="container hero-inner">
        <div className="reveal-stagger reveal in">
          <span className="eyebrow"><span className="dot"></span>ZITA · Time de robôs que trabalha por você</span>
          <h1 className="hero-headline" style={{ marginTop: 24 }}>
            Sua empresa <em>trabalha</em><br/>enquanto você dorme.
          </h1>
          <p className="hero-sub">
            Um time de robôs inteligentes que busca clientes, conversa, vende e organiza sua empresa.
            24 horas por dia. Sem contratar mais gente. Sem parar nunca.
          </p>
          <div className="hero-cta">
            <a href="#cta" className="btn btn-primary">
              Agendar minha demonstração
              <svg className="arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14 M13 6l6 6-6 6"/></svg>
            </a>
            <a href="#flow" className="btn btn-ghost">Ver como funciona</a>
          </div>
          <div className="hero-meta">
            <span><span className="pulse"></span> 6 robôs trabalhando agora</span>
            <span>· Sistema completo · 58 ferramentas</span>
          </div>
        </div>
        <HeroConstellation />
      </div>
    </section>
  );
}

// ── Nav + Brand ───────────────────────────────────────────────────────────────
function Nav() {
  return (
    <nav className="nav">
      <a href="#top" className="nav-logo"><img src="assets/zita-logo.png" alt="ZITA" /><span>ZITA</span></a>
      <div className="nav-links">
        <a href="#zita">Produto</a>

// ── Sections ──────────────────────────────────────────────────────────────────
function Problema() {
  const items = [
    { n:'01', t:'Time perdendo tempo com cliente errado', s:'Seu pessoal liga e manda mensagem o dia todo. A maioria nunca vai comprar.', cost:'+R$ 18 mil/mês' },
    { n:'02', t:'Tudo para às 18h', s:'Quando o time vai embora, o trabalho para. O cliente esfria. A venda escapa.', cost:'Demora +37%' },
    { n:'03', t:'Informação espalhada', s:'Dados na planilha, no e-mail, no WhatsApp, no sistema. Ninguém junta tudo a tempo.', cost:'12h por semana' },
    { n:'04', t:'Crescer só contratando', s:'Cada meta nova pede mais 2, 3, 5 pessoas. A folha sobe mais rápido que a receita.', cost:'Custo +44%' },
  ];
  return (
    <section className="problem reveal" id="problema">

            ))}

}

function WhatIsZita() {
  const desks = [
    { x:8,  y:8,  label:'BUSCA · 01' }, { x:38, y:8,  label:'BUSCA · 02' },
    { x:68, y:8,  label:'PESQUISA'   }, { x:8,  y:38, label:'TRIAGEM'    },

          <div style={{ position:'absolute',left:24,bottom:20,fontFamily:'Geist Mono,monospace',fontSize:11,color:'var(--muted)',letterSpacing:'0.1em',textTransform:'uppercase' }}>ZITA · 9 ROBÔS NO AR · TRABALHANDO AGORA</div>
        </div>

function Flow() {
  const [active, setActive] = useState(0);
  const steps = [
    { n:'01', t:'Encontrar o cliente certo',  c:'O robô descobre quais empresas têm a cara do seu cliente ideal. Sem chute.' },
    { n:'02', t:'Pesquisar tudo sobre ele',   c:'Junta dados públicos de cada empresa na hora. Sem lista comprada, sem dado velho.' },
    { n:'03', t:'Ver quem está pronto',       c:'O robô separa quem quer comprar agora de quem só está olhando.' },
    { n:'04', t:'Falar com o cliente',        c:'Manda e-mail, mensagem no LinkedIn e até liga. Tudo coordenado, na hora certa.' },
    { n:'05', t:'Manter o cliente quente',    c:'Continua o papo com quem ainda não comprou, sem virar chato.' },
    { n:'06', t:'Passar pra você',            c:'Quando o cliente está pronto, entrega tudo mastigado pro seu vendedor fechar.' },
  ];
  useEffect(() => {
    const id = setInterval(() => setActive(a => (a+1) % steps.length), 3500);
    return () => clearInterval(id);
  }, []);
  const cx = 50, cy = 50, r = 38;
  const positions = steps.map((_, i) => polar(cx, cy, r, i*60));
  const a = polar(cx, cy, r, active*60);
  const b = polar(cx, cy, r, active*60+60);
  return (
    <section className="flow reveal" id="flow">
      <div className="container">
        <div style={{ textAlign:'center', maxWidth:720, margin:'0 auto' }}>
          <span className="eyebrow"><span className="dot"></span>Como funciona</span>
          <h2 className="section-title" style={{ marginTop:24 }}>Seis passos. <span className="gradient-text">Que rodam sem parar.</span></h2>
          <p className="section-sub" style={{ marginTop:16, marginInline:'auto' }}>A ZITA cuida do começo ao fim. Você só entra no último passo: fechar a venda.</p>
        </div>
        <div className="flow-stage">
          <svg className="flow-svg" viewBox="0 0 100 100">
            <defs>
              <linearGradient id="flowgrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stopColor="#5dd6ee"/><stop offset="100%" stopColor="#c77cf0"/>
              </linearGradient>
            </defs>
            <circle className="orbit" cx={cx} cy={cy} r={r} />
            <path className="orbit-active" d={`M ${a.x} ${a.y} A ${r} ${r} 0 0 1 ${b.x} ${b.y}`} />
            <circle className="flow-particle" r="1.4">
              <animateMotion dur="9s" repeatCount="indefinite"
                path={`M ${polar(cx,cy,r,0).x} ${polar(cx,cy,r,0).y} A ${r} ${r} 0 1 1 ${polar(cx,cy,r,180.01).x} ${polar(cx,cy,r,180.01).y} A ${r} ${r} 0 1 1 ${polar(cx,cy,r,360).x} ${polar(cx,cy,r,360).y}`} />
            </circle>
          </svg>
          <div className="flow-center">
            <div className="num">{steps[active].n}</div>
            <div className="label">{steps[active].t}</div>
            <div className="copy">{steps[active].c}</div>
          </div>
          {steps.map((s, i) => {
            const p = positions[i];
            return (
              <div key={i} className={`flow-step ${active===i?'active':''}`} style={{ left:`${p.x}%`, top:`${p.y}%` }}
                   onClick={() => setActive(i)} onMouseEnter={() => setActive(i)}>

function Counter({ value, duration = 1800 }) {
  const ref = useRef(null);
  const [n, setN] = useState(0);
  useEffect(() => {
    let raf, started = false, start = 0;
    const step = (t) => {
      if (!start) start = t;
      const p = Math.min(1, (t - start) / duration);
      setN((1 - Math.pow(1-p, 3)) * value);
      if (p < 1) raf = requestAnimationFrame(step);
    };
    const io = new IntersectionObserver((es) => {
      es.forEach(e => { if (e.isIntersecting && !started) { started = true; raf = requestAnimationFrame(step); } });
    }, { threshold: 0.4 });
    if (ref.current) io.observe(ref.current);
    return () => { io.disconnect(); cancelAnimationFrame(raf); };
  }, [value, duration]);
  return <span ref={ref}>{value % 1 === 0 ? Math.round(n) : n.toFixed(1)}</span>;
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  useEffect(() => {
    let raf;
    const setup = () => {
      const els = document.querySelectorAll('.reveal, .reveal-stagger');
      const reveal = (el) => el.classList.add('in');
      els.forEach(el => { const r = el.getBoundingClientRect(); if (r.top < window.innerHeight * 0.92) reveal(el); });
      const io = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) reveal(e.target); });
      }, { threshold: 0, rootMargin: '0px 0px -8% 0px' });
      els.forEach(el => io.observe(el));
      const onScroll = () => {
        const h = window.innerHeight;
        document.querySelectorAll('.reveal:not(.in), .reveal-stagger:not(.in)').forEach(el => {
          const r = el.getBoundingClientRect();
          if (r.top < h * 0.92 && r.bottom > 0) reveal(el);
        });
      };
      window.addEventListener('scroll', onScroll, { passive: true });
      window.addEventListener('resize', onScroll);
      return () => { io.disconnect(); window.removeEventListener('scroll', onScroll); window.removeEventListener('resize', onScroll); };
    };
    let cleanup;
    raf = requestAnimationFrame(() => { requestAnimationFrame(() => { cleanup = setup(); }); });
    return () => { cancelAnimationFrame(raf); if (cleanup) cleanup(); };
  }, []);

  return (
    <>
      <Nav />
      <div id="top"></div>
      <Hero />
      <BrandStrip />
      <Problema />
      <WhatIsZita />
      <Flow />
      <Modules />
      <ForWhom />
      <Numbers />
      <CaseStudy />
      <FinalCTA />
      <Footer />
    </>
  );
}
